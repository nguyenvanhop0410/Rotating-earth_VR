<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotating Earth (Axis Spin)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="info">Realistic Earth (Space Scene)</div>

  <div id="panel">
    <div class="panel-header">
      <h3>Mission Control</h3>
      <div class="badge">VR Ready</div>
    </div>

    <div class="section">
      <div class="section-title">Hiệu năng</div>
      <label class="row row-compact" for="perfMode">
        <span>Preset</span>
        <select id="perfMode">
          <option value="quality">Quality</option>
          <option value="balanced">Balanced</option>
          <option value="vrSmooth">VR Smooth</option>
        </select>
      </label>
      <label class="toggle-row" for="toggleStars">
        <span>Hiện sao</span>
        <input id="toggleStars" type="checkbox" checked />
      </label>
      <label class="toggle-row" for="toggleLabels">
        <span>Hiện địa danh</span>
        <input id="toggleLabels" type="checkbox" checked />
      </label>
      <button id="resetView" class="ghost-btn" type="button">Reset góc nhìn</button>
    </div>

    <div class="section">
      <div class="section-title">Chuyển động</div>
      <div class="row">
        <div>Tốc độ quay Trái Đất</div>
        <div class="value" id="earthSpinVal"></div>
        <input id="earthSpin" type="range" min="0" max="0.02" step="0.0001" />
      </div>

      <div class="row">
        <div>Tốc độ quay mây</div>
        <div class="value" id="cloudsSpinVal"></div>
        <input id="cloudsSpin" type="range" min="0" max="0.03" step="0.0001" />
      </div>
    </div>

    <div class="section">
      <div class="section-title">Ánh sáng</div>
      <div class="row">
        <div>Ánh sáng Mặt Trời</div>
        <div class="value" id="sunKeyVal"></div>
        <input id="sunKey" type="range" min="0" max="10" step="0.05" />
      </div>

      <div class="row">
        <div>Phơi sáng (Exposure)</div>
        <div class="value" id="exposureVal"></div>
        <input id="exposure" type="range" min="0.6" max="1.8" step="0.01" />
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
